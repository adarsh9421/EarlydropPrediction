let allStudents = [];

function parseData() {
    const lines = fullCSVData.trim().split('\n');
    allStudents = lines.slice(1).map(line => {
        const v = line.split(',');
        const att = parseInt(v[4]);
        const marks = parseInt(v[5]);
        
        // Logical risk assessment
        let status = "Low";
        if (att < 50 || marks < 40) status = "High";
        else if (att < 75 || marks < 60) status = "Medium";

        return {
            id: v[1],
            name: v[0],
            age: v[2],
            gender: v[3],
            attendance: att,
            marks: marks,
            income: v[7],
            status: status,
            remarks: v[8]
        };
    });
    renderTable(allStudents);
}

function renderTable(data) {
    const tbody = document.getElementById('fullTableBody');
    document.getElementById('record-count').innerText = `Displaying ${data.length} Total Records`;
    
    tbody.innerHTML = data.map(s => `
        <tr>
            <td>#${s.id}</td>
            <td style="font-weight:600">${s.name}</td>
            <td>${s.age}</td>
            <td style="text-transform: capitalize">${s.gender}</td>
            <td>${s.attendance}%</td>
            <td>${s.marks}</td>
            <td>${parseInt(s.income).toLocaleString()}</td>
            <td><span class="badge ${s.status}">${s.status}</span></td>
            <td style="color: #64748b; font-style: italic">${s.remarks}</td>
        </tr>
    `).join('');
}

function filterData() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const statusFilter = document.getElementById('statusFilter').value;

    const filtered = allStudents.filter(s => {
        const matchesSearch = s.name.toLowerCase().includes(searchTerm) || s.id.includes(searchTerm);
        const matchesStatus = statusFilter === 'all' || s.status === statusFilter;
        return matchesSearch && matchesStatus;
    });

    renderTable(filtered);
}

window.onload = parseData;</script>
